<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff3c3c">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <!-- Propeller Ads -->
  <div id="ad-container" style="position: relative; z-index: 1;">
    <script async src="https://cdn.propellerads.com/js/pa.js"></script>
    <script>
      // Initialize Propeller Ads when page loads
      window.addEventListener('load', function() {
        if (typeof _pa !== 'undefined') {
          _pa.trackEvent('PageView');
        }
      });
    </script>
  </div>
  <script>
    // Expose React globally before Babel processes JSX
    window.React = React;
    window.ReactDOM = ReactDOM;

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/fwq/service-worker.js')
          .then(reg => console.log('Service Worker registered'))
          .catch(err => console.log('Service Worker registration failed'));
      });
    }
  </script>
</head>

  <div id="root"></div>
